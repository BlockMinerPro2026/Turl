<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Космический круг · Атака всегда работает</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #0b0f17;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            padding: 8px;
        }
        .game-wrapper {
            background: #141a24;
            padding: 20px 26px 26px 26px;
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.9), inset 0 0 0 1px #2f3f4f;
            position: relative;
            max-width: 920px;
            width: 100%;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 100%;
            height: auto;
            aspect-ratio: 800/600;
            border-radius: 28px;
            background: #0b1119;
            box-shadow: inset 0 0 40px rgba(0,20,40,0.8), 0 6px 0 #070b10;
            cursor: crosshair;
        }
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
            padding: 0 16px 0 18px;
            color: #b8d0e0;
            background: #0e151f;
            border-radius: 50px;
            height: 68px;
            box-shadow: inset 0 2px 0 #25323e, 0 4px 0 #05090e;
            font-weight: 500;
            letter-spacing: 0.3px;
            flex-wrap: wrap;
            gap: 8px;
        }
        .stats {
            display: flex;
            gap: 16px;
            align-items: center;
            font-size: 1.1rem;
        }
        .hp-bar-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #0b1119;
            padding: 5px 16px 5px 12px;
            border-radius: 30px;
            box-shadow: inset 0 -2px 0 #26343f;
        }
        .hp-bar-bg {
            width: 160px;
            height: 20px;
            background: #1d2a33;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: inset 0 2px 3px #030608;
        }
        .hp-bar-fill {
            height: 100%;
            width: 100%;
            background: #40d0b0;
            border-radius: 30px;
            transition: width 0.12s ease;
            box-shadow: 0 0 16px #40d0b0aa;
        }
        .stat-item {
            background: #0b1119;
            padding: 5px 16px;
            border-radius: 30px;
            box-shadow: inset 0 -2px 0 #26343f;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 1rem;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }
        .controls button {
            background: #1f3140;
            border: none;
            border-radius: 30px;
            color: #eaf2f9;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 7px 18px;
            box-shadow: 0 4px 0 #0a121b, 0 2px 0 #3a5266 inset;
            transition: 0.05s linear;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .controls button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #0a121b, 0 2px 0 #3a5266 inset;
        }
        .controls button:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0a121b;
            cursor: not-allowed;
        }
        .badge {
            background: #1a2633;
            border-radius: 30px;
            padding: 5px 14px;
            color: #aac2d6;
            font-size: 0.9rem;
        }
        #message {
            font-size: 1rem;
            background: #0d1620;
            padding: 5px 20px;
            border-radius: 40px;
            color: #c0def5;
            min-width: 130px;
            text-align: center;
            box-shadow: inset 0 -2px 0 #22323f;
        }
        .speed-control {
            display: flex;
            gap: 5px;
            background: #0b1119;
            padding: 4px 10px;
            border-radius: 30px;
            box-shadow: inset 0 -2px 0 #26343f;
        }
        .speed-btn {
            background: transparent;
            border: none;
            color: #8aaccc;
            font-weight: 700;
            font-size: 0.85rem;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.1s;
        }
        .speed-btn.active {
            background: #2a4a60;
            color: #d0ecff;
            box-shadow: 0 0 10px #2a6a8a;
        }
        .speed-btn:hover {
            background: #1f3a4a;
            color: #d0ecff;
        }

        /* МАГАЗИН */
        .shop-overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0e1a24;
            border: 2px solid #3a6070;
            border-radius: 30px;
            padding: 24px 32px 28px 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.95), inset 0 0 30px rgba(30,80,120,0.2);
            z-index: 10;
            min-width: 300px;
            backdrop-filter: blur(4px);
            max-width: 92%;
        }
        .shop-overlay.active {
            display: block;
        }
        .shop-overlay h2 {
            color: #f0d080;
            text-align: center;
            margin: 0 0 18px 0;
            font-weight: 700;
            letter-spacing: 1px;
            text-shadow: 0 0 20px #f0d08044;
            font-size: 1.4rem;
        }
        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #1f3340;
            gap: 12px;
        }
        .shop-item:last-child {
            border-bottom: none;
        }
        .shop-item span {
            color: #c0d8e8;
            font-size: 0.95rem;
        }
        .shop-item .price {
            color: #f0d080;
            font-weight: 700;
            font-size: 0.95rem;
        }
        .shop-item button {
            background: #1f4050;
            border: none;
            border-radius: 30px;
            color: #eaf2f9;
            font-weight: 600;
            font-size: 0.8rem;
            padding: 6px 18px;
            box-shadow: 0 3px 0 #0a1a22, 0 2px 0 #3a6a7a inset;
            transition: 0.05s linear;
            cursor: pointer;
            white-space: nowrap;
        }
        .shop-item button:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #0a1a22, 0 2px 0 #3a6a7a inset;
        }
        .shop-item button:disabled {
            opacity: 0.4;
            transform: translateY(2px);
            box-shadow: 0 2px 0 #0a1a22;
            cursor: not-allowed;
        }
        .shop-close {
            display: block;
            margin: 18px auto 0 auto;
            background: #3a2a2a;
            border: none;
            border-radius: 30px;
            color: #f0c0c0;
            font-weight: 700;
            padding: 7px 36px;
            box-shadow: 0 3px 0 #1a1010;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .shop-close:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 #1a1010;
        }
        .shop-close:hover {
            background: #4a3a3a;
        }
        @media (max-width: 800px) {
            .panel { height: auto; padding: 14px; gap: 10px; }
            .stats { gap: 10px; flex-wrap: wrap; }
            .hp-bar-bg { width: 120px; }
            .controls { gap: 6px; }
            .controls button { font-size: 0.75rem; padding: 5px 14px; }
            #message { font-size: 0.8rem; min-width: 90px; padding: 4px 14px; }
            .shop-overlay { min-width: 220px; padding: 18px; }
            .shop-item span { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <!-- МАГАЗИН -->
    <div class="shop-overlay" id="shopOverlay">
        <h2>🛒 МАГАЗИН</h2>
        <div class="shop-item">
            <span>🛸 Турель</span>
            <span class="price" id="turretPriceDisplay">12🪙</span>
            <button id="shopBuyTurret">Купить</button>
        </div>
        <div class="shop-item">
            <span>💊 Аптечка (+6 HP)</span>
            <span class="price">10🪙</span>
            <button id="shopBuyHp">Купить</button>
        </div>
        <div class="shop-item">
            <span>⚡ Двойной урон</span>
            <span class="price">18🪙</span>
            <button id="shopBuyDamage">Купить</button>
        </div>
        <div class="shop-item">
            <span>🛡️ Щит (1 блок)</span>
            <span class="price">15🪙</span>
            <button id="shopBuyShield">Купить</button>
        </div>
        <div class="shop-item">
            <span>💫 Регенерация</span>
            <span class="price">25🪙</span>
            <button id="shopBuyRegen">Купить</button>
        </div>
        <button class="shop-close" id="shopClose">✕ Закрыть</button>
    </div>

    <div class="panel">
        <div class="stats">
            <div class="hp-bar-wrap">
                <span style="font-size:1.3rem;">❤️</span>
                <div class="hp-bar-bg">
                    <div class="hp-bar-fill" id="hpFill" style="width: 100%;"></div>
                </div>
            </div>
            <div class="stat-item">🪙 <span id="scoreDisplay">0</span></div>
            <div class="stat-item">🔫 <span id="turretAmmo">8</span></div>
            <div class="stat-item">⚡ <span id="damageBonus">1</span></div>
            <span class="badge" id="turretCount">0</span>
            <span class="badge" id="shieldBadge">🛡️0</span>
        </div>
        <div id="message">⚡ клик по врагу</div>
        <div class="controls">
            <button id="shopToggleBtn">🛒 Магазин</button>
            <button id="pauseBtn">⏸️</button>
            <div class="speed-control">
                <button class="speed-btn active" data-speed="1">1×</button>
                <button class="speed-btn" data-speed="1.25">1.25×</button>
                <button class="speed-btn" data-speed="1.5">1.5×</button>
                <button class="speed-btn" data-speed="2">2×</button>
            </div>
        </div>
    </div>
</div>
<script>
    (function() {
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // UI
        const hpFill = document.getElementById('hpFill');
        const scoreSpan = document.getElementById('scoreDisplay');
        const ammoSpan = document.getElementById('turretAmmo');
        const turretCountSpan = document.getElementById('turretCount');
        const messageDiv = document.getElementById('message');
        const damageBonusSpan = document.getElementById('damageBonus');
        const shieldBadge = document.getElementById('shieldBadge');
        const shopOverlay = document.getElementById('shopOverlay');
        const turretPriceDisplay = document.getElementById('turretPriceDisplay');

        // ---- СОСТОЯНИЕ ----
        const state = {
            hp: 50,
            maxHp: 50,
            score: 0,
            turrets: [],
            enemies: [],
            player: { x: 400, y: 300 },
            attackRadius: 220,
            coreRadius: 30,
            ammo: 8,
            baseTurretPrice: 12,
            turretPrice: 12,
            hpPrice: 10,
            damagePrice: 18,
            shieldPrice: 15,
            regenPrice: 25,
            damageBonus: 1,
            shield: 0,
            regen: false,
            regenTimer: 0,
            frame: 0,
            gameOver: false,
            speed: 1,
            paused: false,
            spawnInterval: 55,
            minSpawnInterval: 22,
            maxEnemies: 10,
            hasTurret: false,
            hasCircle: false,
        };

        // ---- UI обновление ----
        function updateUI() {
            const hpPercent = Math.max(0, (state.hp / state.maxHp) * 100);
            hpFill.style.width = Math.min(100, hpPercent) + '%';
            scoreSpan.textContent = state.score;
            ammoSpan.textContent = state.ammo;
            turretCountSpan.textContent = state.turrets.length;
            damageBonusSpan.textContent = state.damageBonus;
            shieldBadge.textContent = '🛡️' + state.shield;
            turretPriceDisplay.textContent = state.turretPrice + '🪙';

            document.getElementById('shopBuyTurret').disabled = (state.score < state.turretPrice || state.gameOver);
            document.getElementById('shopBuyHp').disabled = (state.score < state.hpPrice || state.hp >= state.maxHp || state.gameOver);
            document.getElementById('shopBuyDamage').disabled = (state.score < state.damagePrice || state.damageBonus >= 2 || state.gameOver);
            document.getElementById('shopBuyShield').disabled = (state.score < state.shieldPrice || state.shield >= 3 || state.gameOver);
            document.getElementById('shopBuyRegen').disabled = (state.score < state.regenPrice || state.regen || state.gameOver);
        }

        // ---- спавн врага ----
        function spawnEnemy() {
            if (state.enemies.length >= state.maxEnemies) return;
            const side = Math.floor(Math.random() * 4);
            let x, y;
            const pad = 30;
            if (side === 0) { x = Math.random() * canvas.width; y = -pad; }
            else if (side === 1) { x = canvas.width + pad; y = Math.random() * canvas.height; }
            else if (side === 2) { x = Math.random() * canvas.width; y = canvas.height + pad; }
            else { x = -pad; y = Math.random() * canvas.height; }

            const canBeRed = state.hasTurret && state.turrets.length > 0;
            const canBeCircle = state.hasCircle && state.turrets.length >= 3;
            
            let isRed = false;
            let isCircle = false;
            let hp = 1;
            let size = 60 + Math.floor(Math.random() * 20);
            let color = `hsl(${Math.floor(Math.random() * 60 + 200)}, 70%, 45%)`;
            let glow = `hsl(${Math.floor(Math.random() * 60 + 200)}, 80%, 55%)`;
            let shape = 'square';

            if (canBeCircle && Math.random() < 0.15) {
                isCircle = true;
                hp = 3;
                size = 50 + Math.floor(Math.random() * 14);
                color = 'hsl(280, 80%, 55%)';
                glow = 'hsl(280, 90%, 65%)';
                shape = 'circle';
            } else if (canBeRed && Math.random() < 0.20) {
                isRed = true;
                hp = 2;
                size = 60 + Math.floor(Math.random() * 16);
                color = 'hsl(0, 80%, 50%)';
                glow = 'hsl(0, 90%, 60%)';
                shape = 'square';
            }

            const speed = 0.6 + Math.random() * 0.7 + (state.turrets.length * 0.02);

            state.enemies.push({
                x, y,
                size: size,
                speed: Math.min(speed, 4.0),
                hp: hp,
                maxHp: hp,
                isRed: isRed,
                isCircle: isCircle,
                shape: shape,
                color: color,
                glow: glow
            });
        }

        // ---- попадание по врагу (ВСЕГДА РАБОТАЕТ) ----
        function hitEnemy(enemy) {
            const damage = state.damageBonus;
            enemy.hp -= damage;
            if (enemy.hp <= 0) {
                let reward = 1;
                if (enemy.isCircle) reward = 5;
                else if (enemy.isRed) reward = 3;
                state.score += reward;
                const idx = state.enemies.indexOf(enemy);
                if (idx !== -1) state.enemies.splice(idx, 1);
                updateUI();
                return true;
            }
            return false;
        }

        // ---- перезарядка турели ----
        function reloadTurret(turret) {
            if (turret.cooldown > 0) return false;
            if (state.ammo <= 0) {
                messageDiv.textContent = '❌ нет патронов!';
                return false;
            }
            state.ammo -= 1;
            turret.ammo = 6;
            turret.cooldown = 0;
            messageDiv.textContent = '🔄 турель перезаряжена';
            updateUI();
            return true;
        }

        // ---- ПОКУПКИ ----
        function buyTurret() {
            if (state.gameOver) return;
            if (state.score < state.turretPrice) { messageDiv.textContent = '❌ не хватает'; return; }
            state.score -= state.turretPrice;
            
            const angle = Math.random() * 2 * Math.PI;
            const dist = 100 + Math.random() * 70;
            const tx = state.player.x + Math.cos(angle) * dist;
            const ty = state.player.y + Math.sin(angle) * dist;
            state.turrets.push({
                x: Math.min(canvas.width-30, Math.max(30, tx)),
                y: Math.min(canvas.height-30, Math.max(30, ty)),
                ammo: 6,
                cooldown: 0,
            });
            
            state.hasTurret = true;
            if (state.turrets.length >= 3) {
                state.hasCircle = true;
            }
            
            state.turretPrice = Math.floor(state.baseTurretPrice * Math.pow(2.5, state.turrets.length));
            
            messageDiv.textContent = '🛸 турель! Цена: ' + state.turretPrice;
            updateUI();
        }

        function buyHp() {
            if (state.gameOver) return;
            if (state.score < state.hpPrice) { messageDiv.textContent = '❌ не хватает'; return; }
            if (state.hp >= state.maxHp) { messageDiv.textContent = '❤️ уже полное'; return; }
            state.score -= state.hpPrice;
            state.hp = Math.min(state.hp + 6, state.maxHp);
            messageDiv.textContent = '+6 ❤️';
            updateUI();
        }

        function buyDamage() {
            if (state.gameOver) return;
            if (state.score < state.damagePrice) { messageDiv.textContent = '❌ не хватает'; return; }
            if (state.damageBonus >= 2) { messageDiv.textContent = '⚡ уже есть'; return; }
            state.score -= state.damagePrice;
            state.damageBonus = 2;
            messageDiv.textContent = '⚡ ДВОЙНОЙ УРОН!';
            updateUI();
        }

        function buyShield() {
            if (state.gameOver) return;
            if (state.score < state.shieldPrice) { messageDiv.textContent = '❌ не хватает'; return; }
            if (state.shield >= 3) { messageDiv.textContent = '🛡️ максимум 3'; return; }
            state.score -= state.shieldPrice;
            state.shield += 1;
            messageDiv.textContent = '🛡️ +1 щит!';
            updateUI();
        }

        function buyRegen() {
            if (state.gameOver) return;
            if (state.score < state.regenPrice) { messageDiv.textContent = '❌ не хватает'; return; }
            if (state.regen) { messageDiv.textContent = '💫 уже есть'; return; }
            state.score -= state.regenPrice;
            state.regen = true;
            messageDiv.textContent = '💫 Регенерация!';
            updateUI();
        }

        // ---- КЛИК (исправлено: атака ВСЕГДА работает) ----
        function handleCanvasClick(e) {
            if (state.gameOver) { messageDiv.textContent = '💀 GAME OVER'; return; }
            if (state.paused) { messageDiv.textContent = '⏸️ Пауза'; return; }
            
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;

            // Проверяем попадание в любой враг
            let hitEnemyObj = null;
            for (const enemy of state.enemies) {
                const half = enemy.size / 2;
                if (mx >= enemy.x - half && mx <= enemy.x + half &&
                    my >= enemy.y - half && my <= enemy.y + half) {
                    hitEnemyObj = enemy;
                    break;
                }
            }

            if (hitEnemyObj) {
                // Проверка зоны атаки
                const d = Math.hypot(hitEnemyObj.x - state.player.x, hitEnemyObj.y - state.player.y);
                if (d > state.attackRadius + hitEnemyObj.size/2) {
                    messageDiv.textContent = '👆 вне зоны!';
                    return;
                }
                
                // ===== ИСПРАВЛЕНИЕ: АТАКА ВСЕГДА РАБОТАЕТ =====
                // Убираем проверку на патроны, наносим урон сразу
                const destroyed = hitEnemy(hitEnemyObj);
                if (destroyed) {
                    if (hitEnemyObj.isCircle) messageDiv.textContent = '💜 +5🪙 (круг!)';
                    else if (hitEnemyObj.isRed) messageDiv.textContent = '💥 +3🪙 (красный!)';
                    else messageDiv.textContent = '💥 +1🪙';
                } else {
                    messageDiv.textContent = '💢 ' + hitEnemyObj.hp + ' HP';
                }
                
                // Бонус: иногда даём патроны для турелей
                if (Math.random() < 0.10) {
                    state.ammo = Math.min(state.ammo + 2, 15);
                    messageDiv.textContent += ' ✨+2 патрона';
                }
                updateUI();
            } else {
                messageDiv.textContent = '🎯 клик по врагу';
            }
        }

        // ---- ОБНОВЛЕНИЕ ----
        function update() {
            if (state.gameOver || state.paused) return;

            const speed = state.speed;
            state.frame += 1;

            // Регенерация
            if (state.regen) {
                state.regenTimer += 1 * speed;
                if (state.regenTimer >= 120) {
                    state.regenTimer = 0;
                    if (state.hp < state.maxHp) {
                        state.hp = Math.min(state.hp + 1, state.maxHp);
                        updateUI();
                    }
                }
            }

            // Спавн
            const currentInterval = Math.max(state.minSpawnInterval, state.spawnInterval);
            if (state.frame % Math.floor(currentInterval / speed) === 0) {
                spawnEnemy();
            }

            // Движение врагов
            for (const enemy of state.enemies) {
                const dx = state.player.x - enemy.x;
                const dy = state.player.y - enemy.y;
                const len = Math.hypot(dx, dy);
                if (len > 0.5) {
                    const step = Math.min(enemy.speed * speed, len);
                    enemy.x += (dx / len) * step;
                    enemy.y += (dy / len) * step;
                }
            }

            // Турели
            for (const turret of state.turrets) {
                if (turret.cooldown > 0) {
                    turret.cooldown -= 1 * speed;
                    if (turret.cooldown < 0) turret.cooldown = 0;
                    continue;
                }
                if (turret.ammo > 0) {
                    let target = null;
                    let minDist = 280;
                    for (const enemy of state.enemies) {
                        const d = Math.hypot(enemy.x - turret.x, enemy.y - turret.y);
                        if (d < minDist) {
                            minDist = d;
                            target = enemy;
                        }
                    }
                    if (target) {
                        turret.ammo -= 1;
                        hitEnemy(target);
                        if (turret.ammo === 0) {
                            turret.cooldown = 140 / speed;
                        }
                    }
                } else {
                    if (turret.cooldown === 0) turret.cooldown = 120 / speed;
                }
            }

            // ---- УРОН ТОЛЬКО ПРИ КАСАНИИ ЯДРА ----
            const toRemove = [];
            for (let i = state.enemies.length - 1; i >= 0; i--) {
                const enemy = state.enemies[i];
                const d = Math.hypot(enemy.x - state.player.x, enemy.y - state.player.y);
                if (d < state.coreRadius + enemy.size / 2) {
                    if (state.shield > 0) {
                        state.shield -= 1;
                        messageDiv.textContent = '🛡️ щит поглотил урон!';
                        toRemove.push(i);
                    } else {
                        state.hp -= 5;
                        toRemove.push(i);
                        if (state.hp <= 0) {
                            state.hp = 0;
                            state.gameOver = true;
                            messageDiv.textContent = '💀 GAME OVER';
                            updateUI();
                            state.enemies = [];
                            return;
                        }
                    }
                }
            }
            for (const idx of toRemove) {
                state.enemies.splice(idx, 1);
            }

            if (state.hp > state.maxHp) state.hp = state.maxHp;
            updateUI();
            if (!state.gameOver && state.hp < 8) {
                messageDiv.textContent = '⚠️ критически!';
            }
        }

        // ---- ОТРИСОВКА ----
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const grad = ctx.createRadialGradient(400, 300, 50, 400, 300, 400);
            grad.addColorStop(0, '#0f1a24');
            grad.addColorStop(1, '#03070c');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = 'rgba(255,255,240,0.12)';
            for (let i=0; i<60; i++) {
                const sx = (i*37+13)%800, sy = (i*53+7)%600;
                ctx.beginPath();
                ctx.arc(sx, sy, 1+ (i%3), 0, 2*Math.PI);
                ctx.fill();
            }

            // зона атаки
            ctx.beginPath();
            ctx.arc(state.player.x, state.player.y, state.attackRadius, 0, 2 * Math.PI);
            ctx.fillStyle = 'rgba(30, 120, 200, 0.05)';
            ctx.fill();
            ctx.strokeStyle = '#60b0e0';
            ctx.lineWidth = 2;
            ctx.setLineDash([8, 16]);
            ctx.shadowColor = '#4090c0';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // ядро
            ctx.beginPath();
            ctx.arc(state.player.x, state.player.y, state.coreRadius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#ff6655';
            ctx.lineWidth = 2.5;
            ctx.setLineDash([4, 8]);
            ctx.shadowColor = '#ff4433';
            ctx.shadowBlur = 15;
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.shadowBlur = 0;

            // центр
            ctx.beginPath();
            ctx.arc(state.player.x, state.player.y, 8, 0, 2 * Math.PI);
            ctx.fillStyle = '#a0e8ff';
            ctx.shadowColor = '#70d0ff';
            ctx.shadowBlur = 25;
            ctx.fill();
            ctx.shadowBlur = 0;

            // враги
            for (const enemy of state.enemies) {
                const half = enemy.size/2;
                ctx.shadowColor = enemy.glow || '#4080c0';
                ctx.shadowBlur = 22;
                ctx.fillStyle = enemy.color || '#4a8db0';
                
                if (enemy.shape === 'circle') {
                    ctx.beginPath();
                    ctx.arc(enemy.x, enemy.y, half, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.9)';
                    ctx.font = 'bold 18px monospace';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(enemy.hp, enemy.x, enemy.y);
                } else {
                    ctx.fillRect(enemy.x - half, enemy.y - half, enemy.size, enemy.size);
                    ctx.shadowBlur = 0;
                    if (enemy.isRed && enemy.hp > 0) {
                        ctx.fillStyle = 'rgba(255,200,100,0.9)';
                        ctx.font = 'bold 18px monospace';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillText(enemy.hp, enemy.x, enemy.y);
                    }
                    ctx.fillStyle = 'rgba(255,255,255,0.08)';
                    ctx.fillRect(enemy.x - half*0.3, enemy.y - half*0.4, enemy.size*0.5, enemy.size*0.3);
                }
                ctx.shadowBlur = 0;
            }

            // турели
            for (const turret of state.turrets) {
                ctx.shadowColor = '#50b0d0';
                ctx.shadowBlur = 18;
                ctx.fillStyle = '#1a4050';
                ctx.beginPath();
                ctx.arc(turret.x, turret.y, 16, 0, 2 * Math.PI);
                ctx.fill();
                ctx.fillStyle = '#4090b0';
                ctx.beginPath();
                ctx.arc(turret.x, turret.y, 10, 0, 2 * Math.PI);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = '#c0ecff';
                ctx.font = 'bold 13px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(turret.ammo, turret.x, turret.y-1);
                if (turret.cooldown > 0) {
                    ctx.strokeStyle = '#f0a070';
                    ctx.lineWidth = 2.5;
                    ctx.beginPath();
                    ctx.arc(turret.x, turret.y, 20, 0, (turret.cooldown / (140/state.speed)) * 2 * Math.PI);
                    ctx.stroke();
                }
            }

            ctx.font = 'bold 14px monospace';
            ctx.fillStyle = '#80d0e0';
            ctx.shadowColor = '#10252a';
            ctx.shadowBlur = 6;
            ctx.fillText(`🪙 ${state.score}  врагов: ${state.enemies.length}`, 15, 32);
            if (state.paused) {
                ctx.fillStyle = '#f0d080';
                ctx.font = 'bold 30px monospace';
                ctx.textAlign = 'center';
                ctx.fillText('⏸ ПАУЗА', 400, 280);
                ctx.textAlign = 'left';
            }
            ctx.shadowBlur = 0;
        }

        // ---- цикл ----
        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // ---- скорость ----
        document.querySelectorAll('.speed-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state.speed = parseFloat(btn.dataset.speed);
            });
        });

        // ---- Магазин ----
        document.getElementById('shopToggleBtn').addEventListener('click', () => {
            shopOverlay.classList.toggle('active');
            if (shopOverlay.classList.contains('active')) {
                updateUI();
            }
        });
        document.getElementById('shopClose').addEventListener('click', () => {
            shopOverlay.classList.remove('active');
        });

        // ---- Кнопки магазина ----
        document.getElementById('shopBuyTurret').addEventListener('click', () => { buyTurret(); updateUI(); });
        document.getElementById('shopBuyHp').addEventListener('click', () => { buyHp(); updateUI(); });
        document.getElementById('shopBuyDamage').addEventListener('click', () => { buyDamage(); updateUI(); });
        document.getElementById('shopBuyShield').addEventListener('click', () => { buyShield(); updateUI(); });
        document.getElementById('shopBuyRegen').addEventListener('click', () => { buyRegen(); updateUI(); });

        // ---- Пауза ----
        document.getElementById('pauseBtn').addEventListener('click', () => {
            state.paused = !state.paused;
            document.getElementById('pauseBtn').textContent = state.paused ? '▶️' : '⏸️';
        });

        // ---- события canvas ----
        canvas.addEventListener('click', handleCanvasClick);

        canvas.addEventListener('dblclick', (e) => {
            if (state.gameOver || state.paused) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mx = (e.clientX - rect.left) * scaleX;
            const my = (e.clientY - rect.top) * scaleY;
            for (const turret of state.turrets) {
                if (Math.hypot(mx - turret.x, my - turret.y) < 24) {
                    reloadTurret(turret);
                    break;
                }
            }
        });

        // ---- СТАРТ ----
        state.hp = state.maxHp;
        updateUI();
        gameLoop();
    })();
</script>
</body>
</html>
